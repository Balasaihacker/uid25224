<!DOCTYPE html>
<html>
    <head> 
        <title>Card Design </title>
    
    <style>
        body{ 
            font-family:Arial, Helvetica, sans-serif;
            background-color:rgb(190, 162, 128);
            text-align:center;
             margin: 2px;
                padding : 20px;
             }
        .container{
            display:flex;
            justify-content: center; 
            flex-wrap:wrap;
            align-items:center;
            overflow-x:auto;
            gap:100px;
        }
        .card{
            background-color:bisque;
            border-radius:10px;
            box-shadow:0 4px 8px rgba(0,0,0,0.2);
            width:300px;
            padding:20px;
            text-align:center;
            transition:transform 0.3s;
        }
        .card:hover{
            transform:translateY(-10px);
        }
        .card h3{
            margin-bottom:10px;
            color:black;
        }
        .card p{
            font-size:15px;
            color:rgb(109, 130, 149);
            margin-bottom:15px;
        }
        .card button{
            background-color:aquamarine;
            color:rgb(100, 16, 16);
            border:none;
            padding:10px 15px;
            border-radius:5px;
            cursor:pointer;
            font-size:16px; 

        } 
        .card button:hover{
            background-color:rgb(0, 255, 255);
        }
        .onepiece-img{
            width:150px;
            height:200px;
            object-fit:cover;
            border-radius:8px;
        }

    </style>
    </head>
    <body background="https://wallpaperaccess.com/full/317501.jpg"></body>
            <h1 style="color: rgb(143, 58, 58);">One Piece Characters</h1>
        <div class="container">
            <div class="card">
                <img class="onepiece-img" 
                src="https://images8.alphacoders.com/133/thumb-1920-1332278.jpeg" alt="One Piece">
                 
                <h3>Monkey D. Luffy</h3>
                <p>Gum-Gum Fruit</p>
                <button> <div class="menu">
                    <a href="Gears.html">
                    Learn More </div></button>
            
            </div>
            <div class="card">
                <img class="onepiece-img"
                src="https://i.pinimg.com/1200x/1a/c9/c4/1ac9c487bb6a9572595c5cd12efbbdf8.jpg" alt="One Piece">
                <h3>Roronoa Zoro</h3>
                <p>Swordsmanship</p>
                <button>Learn More</button>
            </div>
            <div class="card">
                <img class="onepiece-img"
                src="https://images.wallpapersden.com/image/wxl-sanji-art-one-piece-2022_83882.jpg" alt="One Piece">
                <h3> Sanji</h3>
                <p>Black Leg</p>
                <button>Learn More</button>
            
        </div>
    </body>
</html>
