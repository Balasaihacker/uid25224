<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      background-image: url('One_Piece_Anime_Logo.webp');
      background-size: cover;      
      background-repeat: no-repeat; 
        background-attachment: fixed;           
    }
    .container{
        display:flex;
        justify-content:center;
        flex-wrap:wrap;
        align-items:center;
    }
    .card{
            
            border-radius:10px;
            box-shadow:0 4px 8px rgba(0,0,0,0.2);
            width:300px;
            padding:20px;
            text-align:center;
            transition:transform 0.3s;
        }
        .card:hover{
            transform:translateY(-10px);
        }
        .card h3{
            margin-bottom:10px;
            color:black;
        }
        .card p{
            font-size:15px;
            color:rgb(109, 130, 149);
            margin-bottom:15px;
        }
        .card button{
            background-color:aquamarine;
            color:rgb(100, 16, 16);
            border:none;
            padding:10px 15px;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }
    p {
      max-width: 600px;
     
      padding: 10px;
      border-radius: 5px;
    }
  </style>
</head>
