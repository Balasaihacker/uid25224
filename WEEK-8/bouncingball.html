<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Combined CSS Animations</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #f0f0f0;
      display: flex;
      justify-content: space-around;
      align-items: center;
      overflow: hidden;
    }

   

    .bouncing-ball {
      width: 60px;
      height: 60px;
      background-color: #e74c3c;
      border-radius: 50%;
      position: relative;
      animation: bounce 1s ease-in-out infinite alternate;
    }

     @keyframes bounce {
      from {
        top: 0;
      }
      to {
        top: -100px;
      }
    }
  </style>
</head>
<body>
  
  <div class="bouncing-ball"></div>
  
</body>
</html>
