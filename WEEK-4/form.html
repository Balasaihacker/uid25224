<!DOCTYPE html>
<html>
<head>
    <title>College Admission Registration</title>
</head>
<body bgcolor="lightblue"> 
    <tr>
        Pasupuleti Balasai<br></br>
        SC.U4CSE25224
        CSE-C 
    </tr>

    <center>
        <h2>College Admission Registration</h2>
        <form>
            <table border="1" cellpadding="10" cellspacing="0" bgcolor="white">
               
                <tr>
                    <td><label for="fullname">Full Name:</label></td>
                    <td><input type="text" id="fullname" name="fullname"></td>
                </tr>
                <tr>
                    <td><label for="email">Email:</label></td>
                    <td><input type="email" id="email" name="email"></td>
                </tr>
                <tr>
                    <td><label for="phone">Phone Number:</label></td>
                    <td><input type="tel" id="phone" name="phone" pattern="[0-9]{10}" title="Please enter a 10-digit phone number"></td>
                </tr>
                <tr>
                    <td><label>Gender:</label></td>
                    <td>
                        <input type="radio" id="male" name="gender" value="Male">
                        <label for="male">Male</label>
                        <input type="radio" id="female" name="gender" value="Female">
                        <label for="female">Female</label>
                        <input type="radio" id="other" name="gender" value="Other">
                        <label for="other">Other</label>
                    </td>
                </tr>
                <tr>
                    <td><label for="course">Course Applying For:</label></td>
                    <td>
                        <select id="course" name="course">
                            <option value="btech">B.Tech</option>
                            <option value="mtech">M.Tech</option>
                            <option value="mba">MBA</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td><label>Hobbies:</label></td>
                    <td>
                        <input type="checkbox" id="sports" name="hobbies" value="Sports">
                        <label for="sports">Sports</label>
                        <input type="checkbox" id="music" name="hobbies" value="Music">
                        <label for="music">Music</label>
                        <input type="checkbox" id="reading" name="hobbies" value="Reading">
                        <label for="reading">Reading</label>
                    </td>
                </tr>
                <tr>
                    <td><label for="dob">Date of Birth:</label></td>
                    <td><input type="date" id="dob" name="dob"></td>
                </tr>
                <tr>
                    <td><label for="certificates">Upload Certificates:</label></td>
                    <td><input type="file" id="certificates" name="certificates"></td>
                </tr>
                <tr>
                    <td><label for="address">Address:</label></td>
                    <td><textarea id="address" name="address" rows="4" cols="40"></textarea></td>
                </tr>
                <tr>
                    <td colspan="2" align="center">
                        <input type="submit" value="Submit">
                        <input type="reset" value="Reset">
                    </td>
                </tr>
            </table>
        </form>
    </center>

</body>
</html>
